    // Shuffle helper
    const shuffleArray = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    // --- SOUND GENERATOR WITH WEB AUDIO API ---
    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (type === 'correct') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
        } else if (type === 'tick') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1200, ctx.currentTime);
          gain.gain.setValueAtTime(0.05, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
          osc.start();
          osc.stop(ctx.currentTime + 0.06);
        } else if (type === 'gameover') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.8);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
          osc.start();
          osc.stop(ctx.currentTime + 1.0);
        }
      } catch (e) {
        // Fallback gracefully if blocked by browser autoplay settings
      }
    };

      const [timeLeft, setTimeLeft] = useState(20);
      const [soundEnabled, setSoundEnabled] = useState(true);
      
      const [selectedAnswerIndex, setSelectedAnswerIndex] = useState(null);
      const [wrongTrigger, setWrongTrigger] = useState(false);
      const [correctTrigger, setCorrectTrigger] = useState(false);
      
      const [leaderboard, setLeaderboard] = useState([]);
      const [isUploading, setIsUploading] = useState(false);
      const [user, setUser] = useState(null);
      const [showRuleModal, setShowRuleModal] = useState(false);

      const [showConfigModal, setShowConfigModal] = useState(false);
      const [dbConfigJson, setDbConfigJson] = useState('');
      const [dbStatus, setDbStatus] = useState('local'); // 'local' or 'connected'
      const [firebaseInstance, setFirebaseInstance] = useState(null);

      const timerRef = useRef(null);
      const databaseUnsubscribe = useRef(null);

      // Unique App ID for Rules
      const appId = 'aqa-as-biology-streak';

      // --- 1. FIRESTORE DATABASE INITIALIZATION ENGINE ---
      const initFirebase = async (customConfigObj = null) => {
        // Turn off any active listeners
        if (databaseUnsubscribe.current) {
          databaseUnsubscribe.current();
          databaseUnsubscribe.current = null;
        }

        let activeConfig = null;

        // Priority 1: Direct configuration passed from settings modal
        if (customConfigObj) {
          activeConfig = customConfigObj;
        }
        // Priority 2: Config variables injected inside the Sandbox environment
        else if (typeof __firebase_config !== 'undefined' && __firebase_config) {
          try {
            activeConfig = JSON.parse(__firebase_config);
          } catch (e) {
            console.error("Failed to parse sandbox firebase configuration.", e);
          }
        }
        // Priority 3: Custom cached configuration saved inside localStorage from previous session
        else {
          const cached = localStorage.getItem('as_biology_custom_firebase_config');
          if (cached) {
            try {
              activeConfig = JSON.parse(cached);
              setDbConfigJson(JSON.stringify(activeConfig, null, 2));
            } catch (e) {}
          }
        }

        if (!activeConfig) {
          setDbStatus('local');
          setFirebaseInstance(null);
          loadLocalLeaderboard();
          return;
        }

        try {
          // Initialize Firebase App
          let appInstance;
          if (firebase.apps.length > 0) {
            appInstance = firebase.apps[0];
          } else {
            appInstance = firebase.initializeApp(activeConfig);
          }

          const activeAuth = firebase.auth(appInstance);
          const activeDb = firebase.firestore(appInstance);

          // Authenticate BEFORE query (Rule 3)
          if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await activeAuth.signInWithCustomToken(__initial_auth_token);
          } else {
            await activeAuth.signInAnonymously();
          }

          setFirebaseInstance({ db: activeDb, auth: activeAuth });
          setDbStatus('connected');

          // Establish active sync listener on high score collection (Rule 1 & Rule 2)
          const publicDataCollection = activeDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('scores');
          
          databaseUnsubscribe.current = publicDataCollection.onSnapshot((snapshot) => {
            const rawData = [];
            snapshot.forEach((doc) => {
              rawData.push({ id: doc.id, ...doc.data() });
            });
            
            // In-Memory sorting to ensure zero complex database index compilation issues (Rule 2)
            const sortedData = rawData
              .sort((a, b) => b.score - a.score || b.timestamp - a.timestamp)
              .slice(0, 15);

            setLeaderboard(sortedData);
            localStorage.setItem('as_biology_leaderboard', JSON.stringify(sortedData));
          }, (error) => {
            console.error("Database subscription failure. Reverting to local fallback.", error);
            setDbStatus('local');
          });

        } catch (error) {
          console.error("Firebase initialization failed:", error);
          setDbStatus('local');
          loadLocalLeaderboard();
        }
      };

      // Run initial check on load
      useEffect(() => {
        initFirebase();
        return () => {
          if (databaseUnsubscribe.current) databaseUnsubscribe.current();
        };
      }, []);

      // Fallback helper to load scores locally
      const loadLocalLeaderboard = () => {
        const fallbackLocal = localStorage.getItem('as_biology_leaderboard');
        if (fallbackLocal) {
          try {
            setLeaderboard(JSON.parse(fallbackLocal));

      const saveCustomDatabaseConfig = () => {
        try {
          const parsed = JSON.parse(dbConfigJson);
          localStorage.setItem('as_biology_custom_firebase_config', JSON.stringify(parsed));
          initFirebase(parsed);

          alert("Invalid JSON format! Please double-check your pasted Firebase Config object keys.");
        }
      };

      // Reset custom credentials and return back to local-only
      const clearCustomDatabaseConfig = () => {
        localStorage.removeItem('as_biology_custom_firebase_config');
        setDbConfigJson('');
        initFirebase(null);
        setShowConfigModal(false);
      };

      // --- 2. QUESTION CONTROL AND TIMING ENGINE ---
      const startNewGame = () => {
        if (!studentName.trim()) return;
        
        setCurrentStreak(0);
        setSelectedAnswerIndex(null);
        setWrongTrigger(false);
        setCorrectTrigger(false);
        
        const freshQueue = shuffleArray(QUESTIONS);
        setShuffledQueue(freshQueue);
        setCurrentIndex(0);
        
        setGameState('playing');
        loadQuestion(freshQueue[0]);
      };

      const loadQuestion = (questionObj) => {
        if (!questionObj) return;
        
        const originalAnswers = questionObj.Answers;
        const indexedAnswers = originalAnswers.map((ans, idx) => ({ text: ans, originalIndex: idx }));
        const shuffled = shuffleArray(indexedAnswers);
        
        const correctIdx = shuffled.findIndex(item => item.originalIndex === 0);
        
        setShuffledOptions(shuffled.map(item => item.text));
        setCorrectOptionIndex(correctIdx);
        setCurrentQuestion(questionObj);
        setSelectedAnswerIndex(null);
        setWrongTrigger(false);
        setCorrectTrigger(false);
        setTimeLeft(20);
      };

      // 20-second active timer
      useEffect(() => {
        if (gameState !== 'playing') return;

        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              handleTimeout();
              return 0;
            }
            if (soundEnabled && prev <= 6) {
              playSound('tick');
            }
            return prev - 1;
          });
        }, 1000);

        return () => clearInterval(timerRef.current);
      }, [gameState, currentQuestion, soundEnabled]);

      const handleTimeout = () => {
        if (soundEnabled) playSound('wrong');
        setWrongTrigger(true);
        triggerGameOver();
      };

      const handleSelectAnswer = (idx) => {
        if (selectedAnswerIndex !== null || gameState !== 'playing') return;
        
        clearInterval(timerRef.current);
        setSelectedAnswerIndex(idx);

        if (idx === correctOptionIndex) {
          if (soundEnabled) playSound('correct');
          setCorrectTrigger(true);
          const nextStreak = currentStreak + 1;
          setCurrentStreak(nextStreak);
          
          if (nextStreak > highScore) {
            setHighScore(nextStreak);
            localStorage.setItem('as_biology_high_score', nextStreak.toString());
          }

          setTimeout(() => {
            const nextIndex = currentIndex + 1;
            let nextQueue = shuffledQueue;
            let actualNextIndex = nextIndex;
            if (nextIndex >= shuffledQueue.length) {
              nextQueue = shuffleArray(QUESTIONS);
              setShuffledQueue(nextQueue);
              actualNextIndex = 0;
            }
            
            setCurrentIndex(actualNextIndex);
            loadQuestion(nextQueue[actualNextIndex]);
          }, 550);
        } else {
          if (soundEnabled) playSound('wrong');
          setWrongTrigger(true);
          setTimeout(() => {
            triggerGameOver();
          }, 900);
        }
      };

      const triggerGameOver = () => {
        clearInterval(timerRef.current);
        if (soundEnabled) playSound('gameover');
        setGameState('gameover');

          timestamp: Date.now(),
          userId: firebaseInstance?.auth?.currentUser?.uid || 'anonymous'

          try {
            const publicDataCollection = firebaseInstance.db.collection('artifacts').doc(appId).collection('public').doc('data').collection('scores');
            await publicDataCollection.add(scoreData);
          } catch (e) {
            console.error("Direct score upload failed. Saving as local backup.", e);
            saveFallbackScore(scoreData);
          }
        } else {
          saveFallbackScore(scoreData);
        }
        setIsUploading(false);
      };

                    if (selectedAnswerIndex !== null) {
                      if (isSelected && isCorrect) {

                      } else if (isSelected && !isCorrect) {
                        btnStyle = "bg-red-500/15 border-red-500 text-red-400 scale-[0.99]";
                      } else if (isCorrect && isSelected) {
                        btnStyle = "bg-emerald-500/15 border-emerald-500 text-emerald-400";
                      } else {
                        btnStyle = "bg-slate-900/40 border-slate-800/50 text-slate-500 opacity-60";

                    }

                    return (

                        className={`w-full text-left p-4 rounded-xl border font-semibold transition-all duration-200 flex items-center justify-between text-sm sm:text-base relative group overflow-hidden ${btnStyle}`}

            {/* LEADERBOARD VIEW */}
            {gameState === 'gameover' && (

                {/* LEFT: PERFORMANCE SUMMARY */}
                <div className="flex-grow md:w-1/2 flex flex-col justify-between space-y-6">
                  <div>

                  <li>Enter your name to initiate your trial run.</li>
                  <li>Questions are randomized from our structured 100 AQA AS Biology database.</li>
                  <li>You have exactly <span className="font-semibold text-amber-400">20 seconds</span> to answer every card.</li>
                  <li>Answering correctly progresses you <span className="font-semibold text-emerald-400">instantly to the next question</span> with no delay or revealed answer panels.</li>
                  <li>A wrong answer or timeout immediately finishes your run and uploads your current streak rank!</li>
                </ul>
                <button
                  onClick={() => setShowRuleModal(false)}
                  className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-4 rounded-xl text-xs transition"
                >
                  Close Rules
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App inside Root Hook
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
