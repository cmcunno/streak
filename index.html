    // Shuffle helper
    const shuffleArray = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    // --- SOUND GENERATOR WITH WEB AUDIO API ---
    const playSound = (type) => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        if (type === 'correct') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
        } else if (type === 'tick') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(1200, ctx.currentTime);
          gain.gain.setValueAtTime(0.05, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
          osc.start();
          osc.stop(ctx.currentTime + 0.06);
        } else if (type === 'gameover') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.8);
          gain.gain.setValueAtTime(0.2, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
          osc.start();
          osc.stop(ctx.currentTime + 1.0);
        }
      } catch (e) {
        // Fallback gracefully if blocked by browser autoplay settings
      }
    };

    function App() {
      const [gameState, setGameState] = useState('welcome');
      const [studentName, setStudentName] = useState('');
      const [currentStreak, setCurrentStreak] = useState(0);
      const [highScore, setHighScore] = useState(0);

      const [currentIndex, setCurrentIndex] = useState(0);
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [shuffledOptions, setShuffledOptions] = useState([]);
      const [correctOptionIndex, setCorrectOptionIndex] = useState(-1);
      
      const [timeLeft, setTimeLeft] = useState(20);
      const [soundEnabled, setSoundEnabled] = useState(true);
      
      const [selectedAnswerIndex, setSelectedAnswerIndex] = useState(null);
      const [wrongTrigger, setWrongTrigger] = useState(false);
      const [correctTrigger, setCorrectTrigger] = useState(false);
      
      const [leaderboard, setLeaderboard] = useState([]);
      const [showRuleModal, setShowRuleModal] = useState(false);

      // Track exact game timing to record durations
      const [gameStartTime, setGameStartTime] = useState(null);
      
      // Keep track of the most recently submitted attempt's ID to highlight it in the leaderboard
      const [lastAddedId, setLastAddedId] = useState(null);
      
      // Track details of the last broken run to display a subtle alert badge/banner on lobby
      const [lastRunStats, setLastRunStats] = useState(null);

      const timerRef = useRef(null);

      // --- CSV PARSING UTILITY ---
      const parseCSVData = (text) => {
        try {
          const lines = text.split('\n').map(line => line.trim()).filter(line => line);
          if (lines.length <= 1) return [];
          
          return lines.slice(1).map((line, idx) => {
            // Match values, preserving double quoted strings correctly
            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
            const values = matches.map(val => val.replace(/^"|"$/g, '').trim());
            
            const scoreVal = parseInt(values[2], 10) || 0;
            const durationStr = values[3] || "0s";
            
            // Re-convert dynamic text timing to exact seconds for processing
            let durationSec = 0;
            if (durationStr.includes('m')) {
              const parts = durationStr.split('m');
              const mins = parseInt(parts[0], 10) || 0;
              const secs = parseInt(parts[1]?.replace('s', '') || 0, 10) || 0;
              durationSec = (mins * 60) + secs;
            } else {
              durationSec = parseInt(durationStr.replace('s', ''), 10) || 0;
            }

            return {
              id: `csv-${idx}-${Date.now()}`,
              name: values[1] || "Anonymous Student",
              score: scoreVal,
              duration: durationSec,
              date: values[4] || "N/A"
            };
          });
        } catch (e) {
          console.error("Error processing incoming CSV file:", e);
          return [];
        }
      };

      // --- 1. LOCAL DATA COUPLING ON LAUNCH ---
      const syncLeaderboard = async () => {
        let loadedScores = [];

        // Step A: Attempt to fetch static repository csv file (scores.csv)
        try {
          const response = await fetch('./scores.csv');
          if (response.ok) {
            const csvText = await response.text();
            loadedScores = parseCSVData(csvText);
          }
        } catch (error) {
          console.warn("External scores.csv fetch offline or CORS protected. Initializing exclusively from local caching.", error);
        }

        // Step B: Pull user device caching
        const localAttemptsStr = localStorage.getItem('as_biology_local_attempts');
        if (localAttemptsStr) {
          try {
            const localAttempts = JSON.parse(localAttemptsStr);
            // Combine both datasets
            loadedScores = [...loadedScores, ...localAttempts];
          } catch(e) {}
        }

        // Step C: Graceful sorting & filter duplicates in memory
        const sorted = loadedScores
          .sort((a, b) => b.score - a.score || a.duration - b.duration)
          .slice(0, 100); // Maintain top 100

        setLeaderboard(sorted);
      };

      useEffect(() => {
        syncLeaderboard();
      }, []);

      useEffect(() => {
        const savedHighScore = localStorage.getItem('as_biology_high_score');
        if (savedHighScore) {
          setHighScore(parseInt(savedHighScore, 10));
        }
      }, []);

      // --- 2. CSV EXPORT & EXPORT GENERATOR ---
      const handleDownloadCsv = () => {
        if (leaderboard.length === 0) return;
        
        const headers = ["Rank", "Student Name", "Streak (Score)", "Time Taken", "Date Completed"];
        
        const rows = leaderboard.map((item, index) => {
          const displayTime = formatTime(item.duration);
          return [
            index + 1,
            `"${item.name.replace(/"/g, '""')}"`,
            item.score,
            `"${displayTime}"`,
            `"${item.date || ''}"`
          ];
        });

        const csvContent = "\uFEFF" + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "scores.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const formatTime = (seconds) => {
        if (!seconds && seconds !== 0) return "0s";
        if (seconds < 60) return `${seconds}s`;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}m ${secs}s`;
      };

      // --- 3. GAMEPLAY SEQUENCE ---
      const startNewGame = () => {
        if (!studentName.trim()) return;
        
        setCurrentStreak(0);
        setSelectedAnswerIndex(null);
        setWrongTrigger(false);
        setCorrectTrigger(false);
        setGameStartTime(Date.now());
        setLastAddedId(null); // Clear previous highlighting when initiating a new attempt
        
        const freshQueue = shuffleArray(QUESTIONS);
        setShuffledQueue(freshQueue);
        setCurrentIndex(0);
        
        setGameState('playing');
        loadQuestion(freshQueue[0]);
      };

      const loadQuestion = (questionObj) => {
        if (!questionObj) return;
        
        const originalAnswers = questionObj.Answers;
        const indexedAnswers = originalAnswers.map((ans, idx) => ({ text: ans, originalIndex: idx }));
        const shuffled = shuffleArray(indexedAnswers);
        
        const correctIdx = shuffled.findIndex(item => item.originalIndex === 0);
        
        setShuffledOptions(shuffled.map(item => item.text));
        setCorrectOptionIndex(correctIdx);
        setCurrentQuestion(questionObj);
        setSelectedAnswerIndex(null);
        setWrongTrigger(false);
        setCorrectTrigger(false);
        setTimeLeft(20);
      };

      // 20-second active timer loop
      useEffect(() => {
        if (gameState !== 'playing') return;

        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              handleTimeout();
              return 0;
            }
            if (soundEnabled && prev <= 6) {
              playSound('tick');
            }
            return prev - 1;
          });
        }, 1000);

        return () => clearInterval(timerRef.current);
      }, [gameState, currentQuestion, soundEnabled]);

      const handleTimeout = () => {
        if (soundEnabled) playSound('wrong');
        setWrongTrigger(true);
        triggerGameOver();
      };

      const handleSelectAnswer = (idx) => {
        if (selectedAnswerIndex !== null || gameState !== 'playing') return;
        
        clearInterval(timerRef.current);
        setSelectedAnswerIndex(idx);

        if (idx === correctOptionIndex) {
          if (soundEnabled) playSound('correct');
          setCorrectTrigger(true);
          const nextStreak = currentStreak + 1;
          setCurrentStreak(nextStreak);
          
          if (nextStreak > highScore) {
            setHighScore(nextStreak);
            localStorage.setItem('as_biology_high_score', nextStreak.toString());
          }

          setTimeout(() => {
            const nextIndex = currentIndex + 1;
            let nextQueue = shuffledQueue;
            let actualNextIndex = nextIndex;
            if (nextIndex >= shuffledQueue.length) {
              nextQueue = shuffleArray(QUESTIONS);
              setShuffledQueue(nextQueue);
              actualNextIndex = 0;
            }
            
            setCurrentIndex(actualNextIndex);
            loadQuestion(nextQueue[actualNextIndex]);
          }, 550);
        } else {
          if (soundEnabled) playSound('wrong');
          setWrongTrigger(true);
          setTimeout(() => {
            triggerGameOver();
          }, 900);
        }
      };

      const triggerGameOver = () => {
        clearInterval(timerRef.current);
        if (soundEnabled) playSound('gameover');
        
        // Calculate dynamic total duration
        const totalDuration = gameStartTime ? Math.round((Date.now() - gameStartTime) / 1000) : 0;
        
        // Save the run, retrieve its unique entry ID, and store stats for the feedback banner
        const newId = saveAttemptLocally(studentName, currentStreak, totalDuration);
        setLastAddedId(newId);
        setLastRunStats({
          name: studentName,
          score: currentStreak,
          duration: totalDuration
        });
        
        // Transition straight back to the main welcome screen showing the updated scores.csv leaderboard
        setGameState('welcome');
      };

      const saveAttemptLocally = (name, score, duration) => {
        const now = new Date();
        const formattedDate = now.toLocaleDateString('en-GB') + ' ' + now.toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'});
        const attemptId = `local-${Date.now()}-${Math.random()}`;

        const newAttemptObj = {
          id: attemptId,
          name: name.trim().substring(0, 20),
          score: score,
          duration: duration,
          date: formattedDate
        };

        // Pull active list
        let currentLocalList = [];
        const stored = localStorage.getItem('as_biology_local_attempts');
        if (stored) {
          try { currentLocalList = JSON.parse(stored); } catch(e) {}
        }

        // Add, sort, update
        currentLocalList.push(newAttemptObj);
        localStorage.setItem('as_biology_local_attempts', JSON.stringify(currentLocalList));

        // Re-align general in-memory list
        syncLeaderboard();
        
        return attemptId;
      };

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col justify-between font-sans selection:bg-amber-500 selection:text-slate-900">
          
          {/* HEADER BAR */}
          <header className="bg-slate-950/80 backdrop-blur border-b border-slate-800 sticky top-0 z-40">
            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
              
              <div className="flex items-center space-x-3">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-amber-500 to-amber-300 flex items-center justify-center shadow-lg shadow-amber-500/10">
                  <BookOpenIcon className="w-6 h-6 text-slate-950 stroke-[2.5]" />
                </div>
                <div>
                  <h1 className="font-extrabold text-lg tracking-tight bg-gradient-to-r from-amber-200 via-amber-400 to-amber-500 bg-clip-text text-transparent">
                    AQA AS Biology
                  </h1>
                  <p className="text-xs text-slate-400 font-medium font-mono">Streak Revision Arena</p>
                </div>
              </div>

              <div className="flex items-center space-x-2">
                {/* Audio Toggle */}
                <button 
                  onClick={() => setSoundEnabled(!soundEnabled)} 
                  className={`p-2 rounded-lg border transition ${soundEnabled ? 'bg-slate-800/80 border-amber-500/30 text-amber-400 hover:bg-slate-700' : 'bg-slate-900 border-slate-800 text-slate-500 hover:text-slate-400'}`}
                  title={soundEnabled ? "Mute audio cues" : "Unmute audio cues"}
                >
                  {soundEnabled ? <Volume2Icon className="w-4 h-4" /> : <VolumeXIcon className="w-4 h-4" />}
                </button>

                {/* Rules Button */}
                <button 
                  onClick={() => setShowRuleModal(true)} 
                  className="px-3 py-1.5 text-xs font-semibold bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-slate-200 border border-slate-800 rounded-lg transition"
                >
                  How to Play
                </button>
              </div>

            </div>
          </header>

          {/* MAIN CONTAINER */}
          <main className="flex-grow flex items-center justify-center p-4 max-w-5xl w-full mx-auto">
            
            {/* LOBBY / SETUP / LEADERBOARD (WELCOME VIEW) */}
            {gameState === 'welcome' && (
              <div className="w-full bg-slate-950/40 border border-slate-800 rounded-3xl p-5 sm:p-8 shadow-2xl relative overflow-hidden backdrop-blur-md animate-fade-in flex flex-col lg:flex-row gap-6 lg:gap-8">
                
                {/* Decorative Lights */}
                <div className="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl pointer-events-none" />
                <div className="absolute bottom-0 left-0 w-32 h-32 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none" />

                {/* LEFT COLUMN: REGISTRATION & INITIATION PANEL */}
                <div className="flex-grow lg:w-1/3 flex flex-col justify-between space-y-6 relative">
                  <div>
                    <span className="inline-flex items-center space-x-1.5 px-3 py-1 rounded-full bg-amber-500/10 text-amber-400 border border-amber-500/20 text-xs font-bold mb-4 uppercase tracking-widest font-mono">
                      <SparklesIcon className="w-3.5 h-3.5" />
                      <span>100 Premium Questions</span>
                    </span>
                    <h2 className="text-3xl font-black text-white tracking-tight leading-tight">
                      Survive The <br/>
                      <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-200">Biology Streak!</span>
                    </h2>
                    <p className="text-slate-400 text-xs mt-3 leading-relaxed">
                      Zero tolerance assessment revisions. One wrong answer or a timeout at 20 seconds immediately returns you here and adds your placement to the board.
                    </p>
                  </div>

                  {/* LAST BROKEN ATTEMPT FEEDBACK ALERT */}
                  {lastRunStats && (
                    <div className="bg-red-500/10 border border-red-500/20 rounded-2xl p-4 animate-bounce">
                      <div className="flex items-center space-x-2 text-red-400 mb-1">
                        <ShieldAlertIcon className="w-4 h-4 flex-shrink-0" />
                        <span className="text-xs font-black uppercase tracking-wider">Streak Broken!</span>
                      </div>
                      <p className="text-[11px] text-slate-300 leading-normal">
                        <strong>{lastRunStats.name}</strong>, your run ended at a streak of <span className="text-amber-400 font-extrabold">{lastRunStats.score}</span> correct answers in <span className="font-mono text-slate-200">{formatTime(lastRunStats.duration)}</span>.
                      </p>
                    </div>
                  )}

                  {/* ACTIVE ACTION PANEL */}
                  <form onSubmit={(e) => { e.preventDefault(); startNewGame(); }} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 font-mono">
                        Student Name
                      </label>
                      <div className="relative">
                        <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-500">
                          <UserIcon className="w-4 h-4" />
                        </span>
                        <input
                          type="text"
                          required
                          maxLength={20}
                          value={studentName}
                          onChange={(e) => setStudentName(e.target.value)}
                          placeholder="Enter name to begin run..."
                          className="w-full bg-slate-900 border border-slate-800 focus:border-amber-500/80 rounded-xl py-3.5 pl-10 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-amber-500/20 transition text-sm"
                        />
                      </div>
                    </div>

                    <button
                      type="submit"
                      className="w-full bg-gradient-to-r from-amber-500 to-amber-400 hover:from-amber-400 hover:to-amber-300 text-slate-950 font-extrabold rounded-xl py-4 px-4 shadow-lg shadow-amber-500/20 active:translate-y-[1px] transition flex items-center justify-center space-x-2 text-base"
                    >
                      <PlayIcon className="w-5 h-5 fill-current" />
                      <span>{lastRunStats ? 'Start Another Run' : 'Begin Revision Run'}</span>
                    </button>
                  </form>

                  <div className="pt-4 border-t border-slate-950/60 flex items-center justify-between text-[11px] text-slate-500">
                    <span className="flex items-center space-x-1">
                      <ClockIcon className="w-3.5 h-3.5 text-amber-500/70" />
                      <span>20s timer per card</span>
                    </span>
                    <span className="flex items-center space-x-1">
                      <TrophyIcon className="w-3.5 h-3.5 text-amber-500/70" />
                      <span>Your Record: {highScore}</span>
                    </span>
                  </div>
                </div>

                {/* RIGHT COLUMN: REVISION LEADERBOARD PANEL (READS DIRECTLY FROM LOCAL CSV) */}
                <div className="flex-grow lg:w-2/3 flex flex-col justify-between">
                  <div>
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-2">
                      <div className="flex items-center space-x-2">
                        <TrophyIcon className="w-4 h-4 text-amber-400" />
                        <span className="text-xs font-bold uppercase tracking-wider text-slate-400">
                          Classroom Leaderboard (scores.csv)
                        </span>
                      </div>

                      <button
                        onClick={handleDownloadCsv}
                        disabled={leaderboard.length === 0}
                        className="flex items-center justify-center space-x-1.5 px-3 py-1.5 rounded-lg bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold text-xs disabled:opacity-50 disabled:cursor-not-allowed transition shadow-md shadow-amber-500/10"
                      >
                        <DownloadIcon className="w-3.5 h-3.5" />
                        <span>Download updated scores.csv</span>
                      </button>
                    </div>

                    {/* HIGH-RESOLUTION TABULAR GRID */}
                    <div className="bg-slate-950/60 border border-slate-800 rounded-2xl overflow-hidden flex flex-col max-h-[340px]">
                      <div className="overflow-y-auto">
                        <table className="w-full table-auto text-left text-xs border-collapse">
                          <thead>
                            <tr className="bg-slate-900 border-b border-slate-800 text-slate-400 uppercase font-mono text-[10px] tracking-wider sticky top-0 z-10">
                              <th className="py-2.5 px-3 text-center w-12">Rank</th>
                              <th className="py-2.5 px-4">Student</th>
                              <th className="py-2.5 px-3 text-center w-16">Streak</th>
                              <th className="py-2.5 px-3 text-center w-20">Time</th>
                              <th className="py-2.5 px-4 text-right">Completion Date</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-900/60">
                            {leaderboard.length === 0 ? (
                              <tr>
                                <td colSpan="5" className="py-12 text-center text-slate-600 font-medium">
                                  No scores logged in local scores.csv file yet.
                                </td>
                              </tr>
                            ) : (
                              leaderboard.map((item, index) => {
                                const isLatestRun = item.id === lastAddedId;
                                return (
                                  <tr 
                                    key={item.id || index}
                                    className={`transition duration-300 hover:bg-slate-900/40 ${
                                      isLatestRun 
                                        ? 'bg-amber-500/20 text-amber-200 border-l-2 border-l-amber-500 font-extrabold ring-1 ring-amber-500/30 ring-inset' 
                                        : 'text-slate-300'
                                    }`}
                                  >
                                    <td className="py-2.5 px-3 text-center font-bold font-mono">
                                      <span className={
                                        index === 0 ? 'text-amber-400' :
                                        index === 1 ? 'text-slate-300' :
                                        index === 2 ? 'text-amber-700' : 'text-slate-500'
                                      }>
                                        #{index + 1}
                                      </span>
                                    </td>
                                    <td className="py-2.5 px-4 truncate max-w-[120px] font-medium">
                                      {item.name}
                                      {isLatestRun && (
                                        <span className="ml-2 text-[9px] uppercase bg-amber-500/20 border border-amber-500/40 text-amber-300 px-1.5 py-0.5 rounded-full tracking-wider animate-pulse">
                                          Your Run
                                        </span>
                                      )}
                                    </td>
                                    <td className="py-2.5 px-3 text-center font-bold text-amber-400">
                                      <span className="flex items-center justify-center space-x-1">
                                        <span>{item.score}</span>
                                        <FlameIcon className="w-3 h-3 text-orange-500 fill-current" />
                                      </span>
                                    </td>
                                    <td className="py-2.5 px-3 text-center font-mono text-slate-400">
                                      {formatTime(item.duration)}
                                    </td>
                                    <td className="py-2.5 px-4 text-right font-mono text-[10px] text-slate-500">
                                      {item.date}
                                    </td>
                                  </tr>
                                );
                              })
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>

                  {/* INSTRUCTIONAL TIP */}
                  <div className="mt-4 text-center bg-slate-950/60 border border-slate-800 rounded-xl p-3">
                    <p className="text-[11px] text-amber-400 leading-normal font-medium">
                      💡 <strong>Classroom Sync Tip:</strong> To share updated streaks globally, click <strong>"Download updated scores.csv"</strong> and replace the existing <code>scores.csv</code> file inside your GitHub repository folder!
                    </p>
                  </div>
                </div>

              </div>
            )}

            {/* ACTIVE QUESTION PANEL (REMAINS CLEAN, ADAPTIVE AND FAST-PACED) */}
            {gameState === 'playing' && currentQuestion && (
              <div className="w-full max-w-2xl bg-slate-950/40 border border-slate-800 rounded-3xl p-5 sm:p-8 shadow-2xl relative overflow-hidden backdrop-blur-md animate-fade-in">
                
                <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-800/60">
                  {/* CURRENT STREAK STAGE */}
                  <div className="flex items-center space-x-2.5">
                    <div className="px-3.5 py-1.5 rounded-2xl bg-amber-500/10 text-amber-400 border border-amber-500/20 flex items-center space-x-1.5">
                      <FlameIcon className="w-4.5 h-4.5 text-amber-500 animate-pulse fill-current" />
                      <span className="text-sm font-extrabold tracking-wide font-mono">STREAK: {currentStreak}</span>
                    </div>
                    {highScore > 0 && (
                      <span className="text-xs text-slate-500 font-semibold hidden sm:inline">
                        Best Run: {highScore}
                      </span>
                    )}
                  </div>

                  {/* CIRCULAR TIMER */}
                  <div className="flex items-center space-x-2">
                    <div className="relative w-10 h-10 flex items-center justify-center">
                      <svg className="absolute inset-0 w-full h-full -rotate-90">
                        <circle
                          cx="20"
                          cy="20"
                          r="16"
                          className="stroke-slate-800 fill-none"
                          strokeWidth="3.5"
                        />
                        <circle
                          cx="20"
                          cy="20"
                          r="16"
                          className={`fill-none transition-all duration-1000 ${
                            timeLeft <= 5 
                              ? 'stroke-red-500 drop-shadow-[0_0_4px_rgba(239,68,68,0.5)]' 
                              : timeLeft <= 10 
                              ? 'stroke-amber-400' 
                              : 'stroke-emerald-400'
                          }`}
                          strokeWidth="3.5"
                          strokeDasharray="100.5"
                          strokeDashoffset={100.5 - (timeLeft / 20) * 100.5}
                        />
                      </svg>
                      <span className={`text-xs font-black transition-all ${
                        timeLeft <= 5 ? 'text-red-500 scale-110' : 'text-slate-300'
                      }`}>
                        {timeLeft}s
                      </span>
                    </div>
                  </div>
                </div>

                {currentStreak > 0 && currentStreak % 5 === 0 && !selectedAnswerIndex && (
                  <div className="mb-4 text-center py-2 bg-gradient-to-r from-amber-500/10 via-amber-500/20 to-amber-500/10 border-y border-amber-500/20 rounded-lg animate-bounce">
                    <span className="text-xs font-black text-amber-400 uppercase tracking-widest flex items-center justify-center space-x-1.5 font-mono">
                      <SparklesIcon className="w-3.5 h-3.5" />
                      <span>On Fire! {currentStreak} in a row!</span>
                      <SparklesIcon className="w-3.5 h-3.5" />
                    </span>
                  </div>
                )}

                {/* THE QUESTION */}
                <div className="mb-8 min-h-[5rem] flex flex-col justify-center">
                  <span className="text-xs font-bold text-amber-500/70 uppercase tracking-widest mb-1.5 block font-mono">
                    Question {currentIndex + 1}
                  </span>
                  <h3 className="text-lg sm:text-xl font-bold text-white leading-relaxed">
                    {currentQuestion.Question}
                  </h3>
                </div>

                {/* MULTIPLE CHOICE SHUFFLED OPTION TILES */}
                <div className="space-y-3.5">
                  {shuffledOptions.map((option, idx) => {
                    const isSelected = selectedAnswerIndex === idx;
                    const isCorrect = idx === correctOptionIndex;
                    
                    let btnStyle = "bg-slate-900/60 border-slate-800 hover:bg-slate-800/50 hover:border-slate-700 text-slate-200";
                    
                    if (selectedAnswerIndex !== null) {
                      if (isSelected && isCorrect) {
                        btnStyle = "bg-emerald-500/15 border-emerald-500 text-emerald-400 scale-[1.01] shadow-lg shadow-emerald-500/5";
                      } else if (isSelected && !isCorrect) {
                        btnStyle = "bg-red-500/15 border-red-500 text-red-400 scale-[0.99]";
                      } else if (isCorrect && isSelected) {
                        btnStyle = "bg-emerald-500/15 border-emerald-500 text-emerald-400";
                      } else {
                        btnStyle = "bg-slate-900/40 border-slate-800/50 text-slate-500 opacity-60";
                      }
                    }

                    return (
                      <button
                        key={idx}
                        disabled={selectedAnswerIndex !== null}
                        onClick={() => handleSelectAnswer(idx)}
                        className={`w-full text-left p-4 rounded-xl border font-semibold transition-all duration-200 flex items-center justify-between text-sm sm:text-base relative group overflow-hidden ${btnStyle}`}
                      >
                        <span className="flex-grow pr-4 leading-normal">{option}</span>
                        <span className="flex-shrink-0 font-mono">
                          {selectedAnswerIndex !== null && isSelected && isCorrect && (
                            <CheckCircleIcon className="w-5 h-5 text-emerald-400 fill-emerald-950" />
                          )}
                          {selectedAnswerIndex !== null && isSelected && !isCorrect && (
                            <XCircleIcon className="w-5 h-5 text-red-400 fill-red-950" />
                          )}
                          {selectedAnswerIndex === null && (
                            <span className="opacity-0 group-hover:opacity-100 transition duration-150 text-xs text-amber-500/70 border border-amber-500/30 px-2 py-0.5 rounded-md uppercase font-bold tracking-wider">
                              Choose
                            </span>
                          )}
                        </span>
                      </button>
                    );
                  })}
                </div>

                <div className="mt-8 pt-4 border-t border-slate-900/60 text-center">
                  <p className="text-[10px] text-slate-600 font-mono tracking-widest uppercase">
                    AQA Biology Assessment Core
                  </p>
                </div>
              </div>
            )}

          </main>

          {/* FOOTER BAR */}
          <footer className="bg-slate-950/40 border-t border-slate-900 py-3 px-4 text-center text-[11px] text-slate-600 font-mono">
            <p>© 2026 AQA AS-Level Biology Streak Revision Hub. Completely self-contained & offline-ready.</p>
          </footer>

          {/* RULES MODAL */}
          {showRuleModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-sm w-full relative">
                <h4 className="text-base font-bold text-white mb-3 flex items-center space-x-2">
                  <HelpCircleIcon className="w-5 h-5 text-amber-500" />
                  <span>How to Play</span>
                </h4>
                <ul className="space-y-3 text-xs text-slate-300 leading-relaxed mb-6 list-disc list-inside">
                  <li>Enter your student name on the main lobby to start a new session.</li>
                  <li>Syllabus questions are randomized dynamically from our 100 core database.</li>
                  <li>You have exactly <span className="font-semibold text-amber-400">20 seconds</span> to answer every card.</li>
                  <li>Selecting the correct option advances you <span className="font-semibold text-emerald-400">instantly to the next question</span> with no panels displaying answers.</li>
                  <li>Choosing a wrong answer or running out of time finishes your run immediately, adds your entry, and returns you to the lobby to see where you placed in the classroom results!</li>
                </ul>
                <button
                  onClick={() => setShowRuleModal(false)}
                  className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-4 rounded-xl text-xs transition"
                >
                  Close Rules
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App directly without imports/exports
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
