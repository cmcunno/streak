    // Decodes the base64 unicode question bank safely
    const decodeBase64Payload = (b64) => {
      try {
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        const decoder = new TextDecoder('utf-8');
        return JSON.parse(decoder.decode(bytes));
      } catch (e) {
        console.error("Critical error decrypting compiled questions:", e);
        return [];
      }
    };

    const QUESTIONS = decodeBase64Payload(OBFUSCATED_QUESTIONS_PAYLOAD);

    function App() {
      const [gameState, setGameState] = useState('welcome');
      const [studentName, setStudentName] = useState('');
      const [currentStreak, setCurrentStreak] = useState(0);
      const [highScore, setHighScore] = useState(0);
      
      const [shuffledQueue, setShuffledQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [currentQuestion, setCurrentQuestion] = useState(null);
      const [shuffledOptions, setShuffledOptions] = useState([]);
      const [correctOptionIndex, setCorrectOptionIndex] = useState(-1);
      
      const [timeLeft, setTimeLeft] = useState(20);
      const [soundEnabled, setSoundEnabled] = useState(true);
      
      const [selectedAnswerIndex, setSelectedAnswerIndex] = useState(null);
      const [wrongTrigger, setWrongTrigger] = useState(false);
      const [correctTrigger, setCorrectTrigger] = useState(false);
      
      const [leaderboard, setLeaderboard] = useState([]);
      const [showRuleModal, setShowRuleModal] = useState(false);
      const [showMasterDbModal, setShowMasterDbModal] = useState(false);
      
      // Admin variables for pasted CSV synchronization
      const [pastedCSVInput, setPastedCSVInput] = useState('');
      const [importStatusMessage, setImportStatusMessage] = useState(null);

      // Track exact game timing to record durations
      const [gameStartTime, setGameStartTime] = useState(null);
      
      // Identifies the most recent local run index to highlight it with an animated pulse
      const [lastAddedId, setLastAddedId] = useState(null);
      
      // Keeps track of details on the last finished attempt for dynamic alerts on welcome screen
      const [lastRunStats, setLastRunStats] = useState(null);

      const timerRef = useRef(null);
      const queueRef = useRef([]);

      const parseCSVData = (text) => {
        try {
          const lines = text.split('\n').map(line => line.trim()).filter(line => line);
          if (lines.length <= 1) return [];
          
          return lines.slice(1).map((line, idx) => {
            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
            const values = matches.map(val => val.replace(/^"|"$/g, '').trim());
            
            const rawId = values[0] || `csv-${idx}-${Date.now()}`;
            const nameVal = values[1] || "Anonymous";
            const scoreVal = parseInt(values[2], 10) || 0;
            const durationStr = values[3] || "0s";
            const completionDate = values[4] || "N/A";
            
            let durationSec = 0;
            if (durationStr.includes('m')) {
              const parts = durationStr.split('m');
              const mins = parseInt(parts[0], 10) || 0;
              const secs = parseInt(parts[1]?.replace('s', '') || 0, 10) || 0;
              durationSec = (mins * 60) + secs;
            } else {
              durationSec = parseInt(durationStr.replace('s', ''), 10) || 0;
            }

            return {
              id: rawId,
              name: nameVal,
              score: scoreVal,
              duration: durationSec,
              date: completionDate
            };
          });
        } catch (e) {
          console.error("Error processing CSV row:", e);
          return [];
        }
      };

      const generateMasterCSVString = (sortedLeaderboard) => {
        const headers = ["ID/Rank", "Student Name", "Streak (Score)", "Time Taken", "Date Completed"];
        const rows = sortedLeaderboard.map((item, index) => {
          const displayTime = formatTime(item.duration);
          return [
            item.id || `rank-${index + 1}`,
            `"${item.name.replace(/"/g, '""')}"`,
            item.score,
            `"${displayTime}"`,
            `"${item.date || ''}"`
          ];
        });
        return [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
      };

      const syncLeaderboard = async () => {
        let loadedScores = [];

        // Check if there is an imported Master CSV database cached in localStorage
        const cachedMasterCSV = localStorage.getItem('as_biology_master_csv_db');
        if (cachedMasterCSV) {
          loadedScores = parseCSVData(cachedMasterCSV);
        } else {
          // If no master database is found, load from preset companion csv locally
          try {
            const response = await fetch('./scores.csv');
            if (response.ok) {
              const csvText = await response.text();
              loadedScores = parseCSVData(csvText);
            }
          } catch (e) {
            console.warn("Local scores.csv not deployed. Initializing from user storage.");
          }
        }

        // Pull unique attempts recorded directly on this client sandbox
        const localAttemptsStr = localStorage.getItem('as_biology_local_attempts');
        if (localAttemptsStr) {
          try {
            const localAttempts = JSON.parse(localAttemptsStr);
            // Combine both datasets, eliminating duplicates by ID
            const mergedMap = new Map();
            loadedScores.forEach(item => mergedMap.set(item.id, item));
            localAttempts.forEach(item => mergedMap.set(item.id, item));
            loadedScores = Array.from(mergedMap.values());
          } catch(e) {}
        }

        // Sort: Priority 1 = Highest score, Priority 2 = Shortest duration
        const sorted = loadedScores
          .sort((a, b) => b.score - a.score || a.duration - b.duration);

        setLeaderboard(sorted);
        
        // Dynamically pre-populate the master editor with the current state
        setPastedCSVInput(generateMasterCSVString(sorted));
      };

      useEffect(() => {
        syncLeaderboard();
      }, []);

      useEffect(() => {
        const savedHighScore = localStorage.getItem('as_biology_high_score');
        if (savedHighScore) {
          setHighScore(parseInt(savedHighScore, 10));
        }
      }, []);

      const formatTime = (seconds) => {
        if (!seconds && seconds !== 0) return "0s";
        if (seconds < 60) return `${seconds}s`;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}m ${secs}s`;
      };

      const handleDownloadCsv = () => {
        const csvContent = "\uFEFF" + pastedCSVInput;
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "scores.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const copyLastRunToClipboard = () => {
        if (!lastRunStats) return;
        const now = new Date();
        const formattedDate = now.toLocaleDateString('en-GB') + ' ' + now.toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'});
        
        const uniqueId = lastAddedId || `run-${Date.now()}`;
        const displayTime = formatTime(lastRunStats.duration);
        
        const csvRow = `${uniqueId},"${lastRunStats.name.replace(/"/g, '""')}",${lastRunStats.score},"${displayTime}","${formattedDate}"`;
        
        navigator.clipboard.writeText(csvRow).then(() => {
          // Custom success indicators
          setImportStatusMessage({ type: 'success', text: 'Copied Run row directly to Clipboard!' });
          setTimeout(() => setImportStatusMessage(null), 3000);
        });
      };

      const handleImportPastedCSV = () => {
        if (!pastedCSVInput.trim()) return;
        
        const parsed = parseCSVData(pastedCSVInput);
        if (parsed.length === 0) {
          setImportStatusMessage({ type: 'error', text: 'Failed to find valid student headers in your pasted CSV data.' });
          return;
        }

        // Save Master database into system storage
        localStorage.setItem('as_biology_master_csv_db', pastedCSVInput);
        
        // Re-process
        syncLeaderboard();
        setImportStatusMessage({ type: 'success', text: `Success! Integrated ${parsed.length} database row entries into live leaderboard.` });
        setTimeout(() => setImportStatusMessage(null), 3500);
      };

      const startNewGame = () => {
        if (!studentName.trim()) return;
        
        setCurrentStreak(0);
        setSelectedAnswerIndex(null);
        setWrongTrigger(false);
        setCorrectTrigger(false);
        setGameStartTime(Date.now());
        setLastAddedId(null);
        
        const freshQueue = shuffleArray(QUESTIONS);
        queueRef.current = freshQueue;
        setCurrentIndex(0);
        
        setGameState('playing');
        loadQuestion(freshQueue[0]);
      };

      const loadQuestion = (questionObj) => {
        if (!questionObj) return;
        
        const originalAnswers = questionObj.Answers;
        const indexedAnswers = originalAnswers.map((ans, idx) => ({ text: ans, originalIndex: idx }));
        const shuffled = shuffleArray(indexedAnswers);
        
        // The first answer index (originalIndex = 0) in the decrypted obfuscated bank is always correct

        setShuffledOptions(shuffled.map(item => item.text));
        setCorrectOptionIndex(correctIdx);
        setCurrentQuestion(questionObj);
        setSelectedAnswerIndex(null);
        setWrongTrigger(false);
        setCorrectTrigger(false);
        setTimeLeft(20);
      };

        if (gameState !== 'playing') return;

        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              handleTimeout();
              return 0;
            }
            if (soundEnabled && prev <= 6) {
              playSound('tick');
            }
            return prev - 1;
          });
        }, 1000);

        return () => clearInterval(timerRef.current);
      }, [gameState, currentQuestion, soundEnabled]);

        if (soundEnabled) playSound('wrong');
        setWrongTrigger(true);
        triggerGameOver();

                    className="w-full sm:w-auto flex items-center justify-center space-x-1.5 px-4 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold text-xs border border-slate-700 transition"
                  >
                    <DownloadIcon className="w-4 h-4 text-amber-400" />
                    <span>Save to File (scores.csv)</span>
                  </button>

                  <div className="flex items-center space-x-2 w-full sm:w-auto">
                    <button
                      onClick={() => {
                        localStorage.removeItem('as_biology_master_csv_db');
                        localStorage.removeItem('as_biology_local_attempts');
                        syncLeaderboard();
                        setImportStatusMessage({ type: 'success', text: 'All database cache wiped successfully.' });
                        setTimeout(() => setImportStatusMessage(null), 2000);
                      }}
                      className="flex-grow sm:flex-grow-0 px-4 py-2.5 rounded-xl border border-red-900 bg-red-950/20 hover:bg-red-950/40 text-red-400 font-semibold text-xs transition"
                    >
                      Clear Memory
                    </button>

                    <button
                      onClick={handleImportPastedCSV}
                      className="flex-grow sm:flex-grow-0 px-5 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold text-xs transition shadow-lg shadow-amber-500/10"
                    >
                      Import & Sync Database
                    </button>
                  </div>
                </div>

              </div>
            </div>
          )}

          {/* RULES MODAL */}
          {showRuleModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-sm w-full relative">
                <h4 className="text-base font-bold text-white mb-3 flex items-center space-x-2">
                  <HelpCircleIcon className="w-5 h-5 text-amber-500" />
                  <span>How to Play</span>
                </h4>
                <ul className="space-y-3 text-xs text-slate-300 leading-relaxed mb-6 list-disc list-inside">
                  <li>Enter your student name on the main lobby to start a new session.</li>
                  <li>Syllabus questions are randomized dynamically from our core database.</li>
                  <li>You have exactly <span className="font-semibold text-amber-400">20 seconds</span> to answer every card.</li>
                  <li>Selecting the correct option advances you <span className="font-semibold text-emerald-400">instantly to the next question</span> with no panels displaying answers.</li>
                  <li>Choosing a wrong answer or running out of time finishes your run immediately, adds your entry, and returns you to the lobby to see where you placed in the classroom results!</li>
                </ul>
                <button
                  onClick={() => setShowRuleModal(false)}
                  className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-4 rounded-xl text-xs transition"
                >
                  Close Rules
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App directly
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
